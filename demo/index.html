<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="module">
      import { supportsSingleEmoji } from '../src/support.ts';

      const checks = ['🫪', ''];

      for (;;) {
        let anyUndefined = false;

        checks.forEach((c) => {
          const div = document.createElement('div');
          div.textContent = `${c} => ${supportsSingleEmoji(c)}`;
          document.body.appendChild(div);

          if (supportsSingleEmoji(c) === undefined) {
            anyUndefined = true;
          }
        });

        if (!anyUndefined) {
          break;
        }

        await new Promise((r) => window.requestAnimationFrame(r));
      }
    </script>
  </head>
  <body>
    <div style="font-family: AdobeBlank2">Hello</div>
  </body>
</html>
